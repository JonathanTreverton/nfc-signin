<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
  font-family: Arial, sans-serif;
  background:#eef2f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:40px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
  width:300px;
}

h1{
  font-size:28px;
  margin-bottom:20px;
}

button{
  font-size:20px;
  padding:15px 30px;
  border:none;
  border-radius:8px;
  background:#2ecc71;
  color:white;
  cursor:pointer;
  width:100%;
}

button:hover{
  background:#27ae60;
}

.note{
  margin-top:15px;
  color:#666;
  font-size:14px;
}

</style>
</head>

<body>

<div class="card">

<h1>Tap to Sign In</h1>

<button onclick="go()">Continue</button>

<div class="note">Please tap to confirm your sign-in</div>

</div>

<script>

function generateToken(){
  const now = Math.floor(Date.now()/30000);
  return btoa("tRv9x_2026_secret"+now).substring(0,8);
}

function go(){
  const url = "https://script.google.com/macros/s/AKfycbx_KWBAXeKPFoOez0j-R3OXaYq1XL-kXruzQ1cEdnshOnM4MR8lmOXoSINxUTuyvDWdAw/exec"
    + "?action=IN&token=" + generateToken();

  window.location.href = url;
}

</script>

</body>
</html>
