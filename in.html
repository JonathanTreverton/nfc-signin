<!DOCTYPE html>
<html>
<head>
</head>
<body style="font-family:Arial;text-align:center;margin-top:50px;">

<h2>Tap to Sign In</h2>

<button onclick="go()" style="
  font-size:20px;
  padding:15px 30px;
  border:none;
  border-radius:8px;
  background:#2ecc71;
  color:white;
">
Continue
</button>

<script>
function generateToken(){
  const now = Math.floor(Date.now()/30000);
  return btoa("tRv9x_2026_secret"+now).substring(0,8);
}

function go(){
  const url = "https://script.google.com/macros/s/AKfycbx_KWBAXeKPFoOez0j-R3OXaYq1XL-kXruzQ1cEdnshOnM4MR8lmOXoSINxUTuyvDWdAw/exec"
    + "?action=IN&token=" + generateToken();

  window.location.href = url;
}
</script>

</body>
</html>
